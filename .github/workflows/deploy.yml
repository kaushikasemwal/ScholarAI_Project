name: Deploy ScholarAI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - list secrets availability
        run: |
          echo "FIREBASE_CONFIG_JSON set: ${{ secrets.FIREBASE_CONFIG_JSON != '' }}"
          echo "HF_SPACE_URL set: ${{ secrets.HF_SPACE_URL != '' }}"

      - name: Write firebase-config.js
        run: |
          FIREBASE_JSON='${{ secrets.FIREBASE_CONFIG_JSON }}'
          if [ -z "$FIREBASE_JSON" ]; then
            FIREBASE_JSON='{"apiKey":"REPLACE_ME","authDomain":"REPLACE_ME","projectId":"REPLACE_ME","storageBucket":"REPLACE_ME","messagingSenderId":"REPLACE_ME","appId":"REPLACE_ME"}'
          fi
          python3 -c "
          import os, json
          cfg = os.environ.get('FIREBASE_JSON', '')
          lines = [
            'import { initializeApp } from \"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js\";',
            'import { getAuth, GoogleAuthProvider } from \"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js\";',
            'import { getFirestore } from \"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js\";',
            f'const firebaseConfig = {cfg};',
            'const app = initializeApp(firebaseConfig);',
            'const auth = getAuth(app);',
            'const db = getFirestore(app);',
            'const provider = new GoogleAuthProvider();',
            'export { auth, db, provider };',
          ]
          open('frontend/firebase-config.js', 'w').write('\n'.join(lines))
          print('firebase-config.js written')
          " 
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}

      - name: Set API base URL
        run: |
          HF_URL="${{ secrets.HF_SPACE_URL }}"
          if [ -n "$HF_URL" ]; then
            sed -i "s|http://localhost:8000|$HF_URL|g" frontend/script.js
            echo "API_BASE updated to $HF_URL"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
          force_orphan: true

  deploy-backend:
    name: Deploy Backend to Hugging Face Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to Hugging Face Spaces
        run: |
          HF_TOKEN="${{ secrets.HF_TOKEN }}"
          HF_SPACE_ID="${{ secrets.HF_SPACE_ID }}"

          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "HF secrets not set, skipping."
            exit 0
          fi

          git config --global user.email "deploy@scholarai"
          git config --global user.name "ScholarAI Deploy"

          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" hf_space

          rsync -av \
            --exclude='.git' \
            --exclude='frontend' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='outputs' \
            --exclude='uploads' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='hf_space' \
            . hf_space/

          cd hf_space
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to push."
          else
            git commit -m "deploy: sync from GitHub $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "Pushed to HF Spaces."
          fi
