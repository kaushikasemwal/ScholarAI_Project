name: Deploy ScholarAI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write firebase-config.js
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          python3 - <<'PYEOF'
          import os
          cfg = os.environ.get('FIREBASE_JSON', '{}')
          if not cfg or cfg == '{}':
              cfg = '{"apiKey":"REPLACE_ME","authDomain":"REPLACE_ME","projectId":"REPLACE_ME","storageBucket":"REPLACE_ME","messagingSenderId":"REPLACE_ME","appId":"REPLACE_ME"}'
          content = '\n'.join([
              'import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";',
              'import { getAuth, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";',
              'import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";',
              f'const firebaseConfig = {cfg};',
              'const app = initializeApp(firebaseConfig);',
              'const auth = getAuth(app);',
              'const db = getFirestore(app);',
              'const provider = new GoogleAuthProvider();',
              'export { auth, db, provider };',
          ])
          with open('frontend/firebase-config.js', 'w') as f:
              f.write(content)
          print('firebase-config.js written OK')
          PYEOF

      - name: Set API base URL
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          if [ -n "$HF_SPACE_URL" ]; then
            sed -i "s|http://localhost:8000|$HF_SPACE_URL|g" frontend/script.js
            echo "API_BASE set to $HF_SPACE_URL"
          fi

      # Use JamesIves/github-pages-deploy-action which supports Node 24
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend
          branch: gh-pages
          clean: true

  deploy-backend:
    name: Deploy Backend to Hugging Face Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "HF secrets not set, skipping."
            exit 0
          fi

          git config --global user.email "deploy@scholarai"
          git config --global user.name "ScholarAI Deploy"

          # Verbose clone to see exact error
          git clone --verbose \
            "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" \
            hf_space || { echo "Clone failed — check HF_TOKEN and HF_SPACE_ID"; exit 1; }

          rsync -av \
            --exclude='.git' \
            --exclude='frontend' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='outputs' \
            --exclude='uploads' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='hf_space' \
            . hf_space/

          cd hf_space
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to push."
          else
            git commit -m "deploy: sync from GitHub $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "Pushed to HF Spaces."
          fi
