name: Deploy ScholarAI

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase config
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          if [ -z "$FIREBASE_CONFIG_JSON" ]; then
            FIREBASE_CONFIG_JSON='{"apiKey":"REPLACE_ME","authDomain":"REPLACE_ME","projectId":"REPLACE_ME","storageBucket":"REPLACE_ME","messagingSenderId":"REPLACE_ME","appId":"REPLACE_ME"}'
            echo "WARNING: FIREBASE_CONFIG_JSON not set, using placeholder"
          fi
          {
            echo 'import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";'
            echo 'import { getAuth, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";'
            echo 'import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";'
            echo "const firebaseConfig = ${FIREBASE_CONFIG_JSON};"
            echo 'const app = initializeApp(firebaseConfig);'
            echo 'const auth = getAuth(app);'
            echo 'const db = getFirestore(app);'
            echo 'const provider = new GoogleAuthProvider();'
            echo 'export { auth, db, provider };'
          } > frontend/firebase-config.js
          echo "firebase-config.js written OK"

      - name: Set production API base URL
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          if [ -n "$HF_SPACE_URL" ]; then
            sed -i "s|http://localhost:8000|${HF_SPACE_URL}|g" frontend/script.js
            echo "API_BASE set to ${HF_SPACE_URL}"
          else
            echo "HF_SPACE_URL not set, keeping localhost"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
          force_orphan: true

  deploy-backend:
    name: Deploy Backend to Hugging Face Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "HF secrets not configured, skipping backend deploy."
            exit 0
          fi

          git config --global user.email "deploy@scholarai"
          git config --global user.name "ScholarAI Deploy"

          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" hf_space

          rsync -av \
            --exclude='.git' \
            --exclude='frontend' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='outputs' \
            --exclude='uploads' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='hf_space' \
            . hf_space/

          cd hf_space
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to push."
          else
            git commit -m "deploy: sync from GitHub $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "Pushed to Hugging Face Spaces."
          fi
