<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScholarAI — Sign In</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="grid-overlay"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">Scholar<em>AI</em></span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">
        Sign in to access your notes, summaries, quizzes, and generated media.
      </p>

      <!-- Google Sign-In Button -->
      <button class="btn-google-signin" id="googleSignInBtn" onclick="signInWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <!-- Email/Password Form -->
      <form class="auth-form" id="authForm" onsubmit="return false">
        <div class="form-group">
          <label for="emailInput">Email</label>
          <input type="email" id="emailInput" placeholder="you@university.edu" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="passwordInput">Password</label>
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <div class="auth-error" id="authError" style="display:none"></div>

        <button class="btn-auth-submit" id="signInBtn" onclick="signInWithEmail()">Sign In</button>
        <button class="btn-auth-secondary" id="signUpBtn" onclick="signUpWithEmail()">Create Account</button>
      </form>

      <p class="auth-footer-note">
        Your data is stored securely in Firebase and never shared.
      </p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
